[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "shipinhao-upload"
version = "0.1.0"
description = "视频号自动化上传工具"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "nodriver>=0.45",
    "loguru",
    "pyautogui",
]

[tool.setuptools.packages.find]
include = ["shipinhao*", "utils*"]
